<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Counter</title>
  <link rel="stylesheet" href="css/styles.css">
 </head>
 <style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    .conntainer {
        height: 300px;
        width: 300px;
        border-radius: 20px;
        background: black;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
        color: white;
        font-size: 20px;
        grid-gap:20px;
    }

    .visitor-number {
        padding: 20px;
        border-radius: 10px;
        background-color: orange;
        
    }
 </style>
 <body>
    <div class="container">
        <p>Your Visit Number</p>
        <div class="visitor-number"></div>
    </div>
 </body>
 <script>
    function cb(response){
        document.querySelector('.visitor-number').innerText * response.value;
    }
 </script>
 <script  async src="https://api.countapi.xyz/hit/codenath.com/visits?callback=cb"></script>
</html>
